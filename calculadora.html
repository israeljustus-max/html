<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="arial">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <style>
        .campo{
            background-color: aliceblue
        }
        .botao{
            width:4% ;
            height:3% ;
            background-color: rgb(128, 184, 233);
        }
        .botao2{
            width:4% ;
            height:3% ;
            background-color: wheat;
        }
        .botao3{
            width:4% ;
            height:3% ;
            background-color: rgb(241, 241, 152);
        }
        .botao4{
            width:4% ;
            height:3% ;
            background-color: rgb(148, 232, 148);
        }
        
    </style>
</head>
<body>
    
    <fieldset>
        <legend>Calculadora Israel-2°A</legend>
        <input type="text" class="campo" id="campo"><br><br>
        <button class="botao">1</button>
        <button class="botao">2</button>
        <button class="botao">3</button>
        <button class="botao2">*</button>
        <button class="botao2">^</button><br>
        <button class="botao">4</button>
        <button class="botao">5</button>
        <button class="botao">6</button>
        <button class="botao2">+</button>
        <button class="botao2">-</button><br>
        <button class="botao">7</button>
        <button class="botao">8</button>
        <button class="botao">9</button>
        <button class="botao2">/</button>
        <button class="botao2">(</button><br>
        <button class="botao2">)</button>
        <button class="botao">0</button>
        <button class="botao2">x</button>
        <button class="botao2">%</button>
        <button class="botao2">#</button><br>
        <button class="botao3">c</button>
        <button class="botao4">=</button>
    </fieldset>

</body>
</html>
